name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.CI_DEPLOY_ROLE_ARN }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ECR_REPO }}:latest .

      - name: Tag and push to ECR
        run: |
          docker tag ${{ secrets.ECR_REPO }}:latest ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO }}:latest
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO }}:latest

      - name: Trigger SSM command to update instances
        run: |
          # This requires the CI role to have ssm:SendCommand and iam passthrough
          # Replace INSTANCE_IDS with the comma-separated instance IDs per tenant
          aws ssm send-command --document-name "AWS-RunShellScript" --comment "Deploy from CI" --parameters commands=['docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO }}:latest','docker stop app || true','docker rm app || true','docker run -d --name app ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO }}:latest'] --instance-ids ${{ secrets.DEPLOY_INSTANCE_IDS }}
